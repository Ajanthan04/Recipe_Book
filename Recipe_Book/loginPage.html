<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Recipe Book</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="split-layout">
        <div class="split-left">
            <img src="https://images.unsplash.com/photo-1556910103-1c02745aae4d?auto=format&fit=crop&w=1600&q=80"
                alt="Beautiful kitchen preparing food">
            <div class="overlay"></div>
            <div class="hero-text">
                <h1>Welcome Back</h1>
                <p>Discover and share your favorite recipes with our community.</p>
            </div>
        </div>
        <div class="split-right">
            <div class="form-container">
                <div style="margin-bottom: 20px;">
                    <img src="Logo.jpeg" alt="Recipe Book Logo"
                        style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin: 0 auto; display: block; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                </div>
                <h2>Login</h2>
                <form action="homePage.html" method="get" onsubmit="validateLogin(event)">
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Enter your password" required>
                    </div>
                    <div class="form-actions" style="flex-direction: column; gap: 15px;">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                        <p style="color: var(--text-muted); font-size: 14px; margin-top: 10px;">
                            Don't have an account? <a href="signupPage.html" style="font-weight: 500;">Signup here</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        function validateLogin(event) {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            if (email === "" || password === "") {
                alert("Please fill all fields");
                event.preventDefault();
            }
        }
    </script>
</body>

</html>
