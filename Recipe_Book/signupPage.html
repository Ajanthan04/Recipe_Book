<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Recipe Book</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="split-layout">
        <div class="split-left">
            <img src="https://images.unsplash.com/photo-1495521821757-a1efb6729352?auto=format&fit=crop&w=1600&q=80"
                alt="Fresh ingredients">
            <div class="overlay"></div>
            <div class="hero-text">
                <h1>Join the Community</h1>
                <p>Start your culinary journey and share your creations.</p>
            </div>
        </div>
        <div class="split-right">
            <div class="form-container">
                <h2>Create Account</h2>
                <form action="homePage.html" method="get" onsubmit="validateSignup(event)">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="Your full name"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input type="email" id="email" name="email" class="form-control"
                            placeholder="Your email address" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Create a password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                            placeholder="Confirm your password" required>
                    </div>
                    <div class="form-actions" style="flex-direction: column; gap: 15px;">
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign up</button>
                        <p style="color: var(--text-muted); font-size: 14px; margin-top: 10px;">
                            Already have an account? <a href="loginPage.html" style="font-weight: 500;">Login here</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script>
        function validateSignup(event) {

            const password = document.getElementById("password").value;
            const confirm = document.getElementById("confirm_password").value;

            if (password !== confirm) {
                alert("Passwords do not match!");
                event.preventDefault();
            }
        }
    </script>
</body>

</html>
